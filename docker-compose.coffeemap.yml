# Override para VPS coffeemap: une la app a la red de coffeemap_reverse_proxy.
# Nginx usa: http://tecnica_dental_app:3000  (puerto interno del contenedor)
#
# 1. docker inspect coffeemap_reverse_proxy --format '{{range $k,$v := .NetworkSettings.Networks}}{{$k}} {{end}}'
# 2. En .env: DOCKER_NETWORK=nombre_real
# 3. npm run docker:up:prod

services:
  app:
    networks:
      - default
      - coffeemap

networks:
  coffeemap:
    external: true
    name: ${DOCKER_NETWORK}
